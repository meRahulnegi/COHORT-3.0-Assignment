<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>part 3</title>
</head>
<body>
    <h1><center>--------STUDENT REGISTRATION FORM ---------</center></h1>
    <form>
        <fieldset>
            <legend>Personal Details</legend>
            <label for="Name">Name:</label>
            <input id="Name"  type="text" placeholder="enter name">
             <br><br>

            <label for="Email">Email:</label>
            <input id="Email"  type="email" placeholder="enter email">
            <br><br>

            <label for="Mobile">Mobile Number:</label>
            <input id="Mobile"  type="tel" placeholder="enter mobile number">
            <br><br>
        </fieldset>

<br><br>

        <fieldset>
            <legend>Address Details</legend>
            <label for="Address">Address line 1:</label>
            <textarea id="Address" placeholder="address line 1" rows="5"></textarea>
            <br><br>

            <label for="State">State:</label>
            <select id="State">
                <option>Punjab</option>
                <option>uttarakhand</option>
                <option>J&K</option>
                <option>Himachal</option>
                <option>Bihar</option>
                <option>Jharkhand</option>   
            </select>
        </fieldset>
         <br><br>

        <label for="Courses">Select Courses:</label>
        <select>
            <optgroup label="TECH">
            <option>B.Tech</option>
            <option>Bca</option>
            <option>Mca</option>
            <option>M.Tech</option>
            </optgroup>
          
            <optgroup label="LAW">
            <option>Bba llb</option>
            <option>ba llb</option>
            </optgroup>

            <optgroup label="Businees">
            <option>Bba</option>
            <option>Mba</option>
            </optgroup>
        </select>
    </form>
<br><br>

    <button>Submit Form</button>
</body>
</html>
